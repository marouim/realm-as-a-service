apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  labels:
    app: sso
  name: example-keycloak
  namespace: keycloak
spec:
  db:
    database: keycloak
    host: postgres-db-service
    passwordSecret:
      key: password
      name: keycloak-db-secret
    usernameSecret:
      key: username
      name: keycloak-db-secret
    vendor: postgres
  hostname:
    hostname: keycloak-keycloak.apps.cy0ho9ko.eastus.aroapp.io
  http:
    tlsSecret: my-tls-secret
  instances: 1
  networkPolicy:
    enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  update:
    strategy: RecreateOnImageChange
